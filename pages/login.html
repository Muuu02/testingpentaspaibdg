<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - PENTAS PAI KOTA BANDUNG 2026</title>
    <meta name="description" content="Halaman login admin PENTAS PAI Kota Bandung 2026">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        emerald: {
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7',
                            400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857',
                            800: '#065f46', 900: '#064e3b', 950: '#022c22',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* ===== DARK MODE ===== */
        * { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .gradient-emerald {
            background: linear-gradient(135deg, #065f46 0%, #047857 50%, #059669 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            transition: all 0.3s ease;
            color: #064e3b;
            font-weight: 600;
        }
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .input-field {
            background-color: #334155;
            border: 2px solid #475569;
            color: #f1f5f9;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            outline: none;
        }
        .input-field::placeholder { color: #94a3b8; }
        
        .touch-target { min-height: 44px; min-width: 44px; }
        
        .login-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.5rem;
        }
    </style>
</head>
<body class="font-inter antialiased flex items-center justify-center min-h-screen p-4">
    <div class="login-card w-full max-w-md p-6 md:p-8 shadow-2xl">
        <div class="text-center mb-6 md:mb-8">
            <div class="w-16 h-16 md:w-20 md:h-20 gradient-emerald rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-mosque text-2xl md:text-3xl text-amber-400"></i>
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-white">Admin Panel</h1>
            <p class="text-gray-300 text-sm">PENTAS PAI Kota Bandung 2026</p>
        </div>
        
        <form id="loginForm" class="space-y-4 md:space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-200 mb-2">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="username" required
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl"
                        placeholder="Masukkan username">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-200 mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" required
                        class="input-field w-full pl-12 pr-12 py-3 rounded-xl"
                        placeholder="Masukkan password">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200 touch-target w-10 h-10 flex items-center justify-center">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            
            <div id="loginError" class="hidden p-4 bg-red-900/30 text-red-300 rounded-lg text-sm border border-red-500">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="loginErrorText">Username atau password salah</span>
            </div>
            
            <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-xl font-bold touch-target">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="../index.html" class="text-gray-400 hover:text-emerald-400 transition text-sm">
                <i class="fas fa-arrow-left mr-1"></i>Kembali ke Beranda
            </a>
        </div>
        
        <div class="mt-6 text-center text-xs text-gray-500">
            <p><i class="fas fa-shield-alt mr-1"></i>Keamanan: SHA-256</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
    <script>
        // Fungsi hash SHA-256 sederhana
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
        
        function showLoginError(message) {
            const loginError = document.getElementById('loginError');
            document.getElementById('loginErrorText').textContent = message;
            loginError.classList.remove('hidden');
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            
            loginError.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Memverifikasi...';
            
            try {
                const passwordHash = await hashPassword(password);
                
                const response = await fetch(CONFIG.GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        passwordHash: passwordHash
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Simpan session sederhana
                    sessionStorage.setItem('adminUser', JSON.stringify(result.user));
                    sessionStorage.setItem('adminLoginTime', Date.now());
                    
                    // Redirect ke admin panel
                    window.location.href = 'admin.html';
                } else {
                    showLoginError(result.message || 'Username atau password salah');
                }
            } catch (error) {
                console.error('Login error:', error);
                showLoginError('Terjadi kesalahan. Pastikan koneksi internet stabil.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Login';
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        
        // Enter key untuk submit
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin(e);
        });
        
        // Cek jika sudah login, redirect ke admin
        const adminUser = sessionStorage.getItem('adminUser');
        const loginTime = sessionStorage.getItem('adminLoginTime');
        if (adminUser && loginTime) {
            // Session valid 24 jam
            const elapsed = Date.now() - parseInt(loginTime);
            if (elapsed < 24 * 60 * 60 * 1000) {
                window.location.href = 'admin.html';
            } else {
                sessionStorage.clear();
            }
        }
    </script>
</body>
</html>
